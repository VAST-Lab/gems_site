<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Gem Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sb-brand">My Gem Library</div>
        <nav class="sb-nav">
      <a class="sb-item sb-item-on" href="index.html">Explore</a>
      <a class="sb-item" href="convert.html">Convert</a>
      <a class="sb-item" href="index.html">Manage</a>
      <a class="sb-item" href="index.html">Upload</a>
      <a class="sb-item" href="index.html">Settings</a>
    </nav>
    <div class="sb-footer muted">Tip: add models in<br><code>assets/models</code></div>
  </aside>

  <div class="content">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">Gem Library</div>
      <div class="muted">Browse • search • click for details + 360</div>
    </div>

    <div class="topbar-right">
      <input id="search" class="search" placeholder="Search models, tags, author…" autocomplete="off" />
    </div>
  </header>

  <main class="wrap">
    <section class="filters">
      <div class="filters-row">
        <div class="filters-title">Tags</div>
        <div id="tagChips" class="chips" aria-label="Tag filters"></div>
      </div>

      <div class="filters-row">
        <div class="filters-title">Results</div>
        <div id="count" class="muted"></div>
      </div>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js"
  }
}
</script>

<script type="module" src="app.js"></script>
  </div>
</div>
</body>
</html>
