<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  
  <title>GemScan Library</title>
  
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">

  <link rel="manifest" href="/assets/icons/site.webmanifest">
  
  <meta name="description" content="A curated library of 3D models and Gaussian Splats.">
  <meta name="author" content="VAST Lab">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sb-brand">GemScan Library</div>
        <nav class="sb-nav">
      <a class="sb-item sb-item-on" href="index.html">Explore</a>
      <a class="sb-item" href="convert.html">Convert</a>
      <a class="sb-item" href="index.html">Manage</a>
      <a class="sb-item" href="index.html">Upload</a>
      <a class="sb-item" href="index.html">Settings</a>
    </nav>
    <div class="sb-footer muted">Tip: add models in<br><code>assets/models</code></div>
  </aside>

  <div class="content">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">GemScan Library</div>
      <div class="muted">Browse • search • click for details + 360</div>
    </div>

  <div class="topbar-right">
      <input id="search" class="search" placeholder="Search models, tags, author…" autocomplete="off" />
      <img src="GemScan.logo.PNG" class="header-logo" alt="GEMSCANS" />
    </div>
  </header>

  <main class="wrap">
    <section class="filters">
      <div class="filters-row">
        <div class="filters-title">Tags</div>
        <div id="tagChips" class="chips" aria-label="Tag filters"></div>
      </div>

      <div class="filters-row">
        <div class="filters-title">Results</div>
        <div id="count" class="muted"></div>
      </div>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.178/build/three.module.js"
  }
}
</script>

<script type="module" src="app.js"></script>
  </div>
</div>
</body>
</html>
