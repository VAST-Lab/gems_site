<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PlayCanvas Gaussian Splat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
    <script type="importmap">
	{
	    "imports": {
		"playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas@latest/build/playcanvas.mjs",
		"camera-controls": "https://cdn.jsdelivr.net/npm/playcanvas/scripts/esm/camera-controls.mjs"
	    }
	}
	</script>

</head>
<body>
    <script type="module">
        import * as pc from 'playcanvas';
        import { CameraControls } from 'camera-controls';

        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);

        const app = new pc.Application(canvas, {
            mouse: new pc.Mouse(document.body),
            touch: new pc.TouchDevice(document.body),
            keyboard: new pc.Keyboard(window), // for keyboard support (workaround for me to zoom out)
            elementInput: new pc.ElementInput(canvas),
            graphicsDeviceOptions: { antialias: false }
        });

        app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        app.start();

        pc.registerScript(CameraControls, 'cameraControls');

        // setup camera
        const camera = new pc.Entity('Camera');
        camera.addComponent('camera', { clearColor: new pc.Color(0, 0, 0) });
        camera.addComponent('script');
        camera.script.create('cameraControls');
        camera.setPosition(0, 2, 5); 
        app.root.addChild(camera);

        // keyboard zoom listeners
        app.on('update', (dt) => {
            const zoomSpeed = 10 * dt; // Adjust this number to change zoom speed

            // Move back (Zoom Out)
            if (app.keyboard.isPressed(pc.KEY_S) || app.keyboard.isPressed(pc.KEY_DOWN)) {
                camera.translateLocal(0, 0, zoomSpeed);
            }
            // Move forward (Zoom In)
            if (app.keyboard.isPressed(pc.KEY_W) || app.keyboard.isPressed(pc.KEY_UP)) {
                camera.translateLocal(0, 0, -zoomSpeed);
            }
        });

        // Load the Splat
        const splatUrl = 'https://huggingface.co/datasets/vastlabstudent/Gems_Splats/resolve/main/purple_gem.sog';
        const splatAsset = new pc.Asset('gem', 'gsplat', { url: splatUrl });
        
        app.assets.add(splatAsset);
        app.assets.load(splatAsset);

        splatAsset.ready(() => {
            console.log("Gem Loaded!");
            const splatEntity = new pc.Entity('Splat');
            splatEntity.addComponent('gsplat', { asset: splatAsset });
            splatEntity.setLocalEulerAngles(180, 0, 0); 
            app.root.addChild(splatEntity);
        });

        window.addEventListener('resize', () => app.resizeCanvas());
    </script>
</body>
</html>
